<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SafeRoute — Transporte Escolar Seguro</title>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Plus+Jakarta+Sans:wght@700;800&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/styles.css" />
  <link rel="stylesheet" href="assets/css/nav.css" />
  <link rel="stylesheet" href="assets/css/hero.css" />
</head>

<body>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-text">
      <div class="hero-badge"><span data-i18n="hero.badge"></span></div>
      <h1><span data-i18n="hero.title_line1"></span><br /><em data-i18n="hero.title_line2"></em></h1>
      <p data-i18n="hero.description"></p>
      <div class="hero-actions">
        <a href="#plans" class="btn-primary" data-i18n="hero.btn_plans"></a>
        <a href="#how" class="btn-outline" data-i18n="hero.btn_how"></a>
      </div>
    </div>
    <div class="hero-visual">
      <div class="hero-tag tag-1"><span class="icon">🛡️</span> <span data-i18n="hero.tag1"></span></div>
      <div class="phone-mockup">
        <div class="phone-screen">
          <div class="ps-header">
            <span data-i18n="hero.phone_route"></span>
            <div class="ps-dot"></div>
          </div>
          <div class="ps-map">
            <div class="route-line"></div>
            <div class="stop-dot"></div>
            <div class="stop-dot"></div>
            <div class="stop-dot"></div>
            <div class="bus-icon">🚌</div>
          </div>
          <div class="ps-card">
            <div class="ps-avatar">LM</div>
            <div class="ps-card-text">
              <strong data-i18n="hero.driver_name"></strong>
              <span data-i18n="hero.driver_status"></span>
            </div>
            <span class="ps-badge" data-i18n="hero.driver_badge"></span>
          </div>
          <div class="ps-card">
            <div class="ps-avatar" style="background:#1D3F6E">SM</div>
            <div class="ps-card-text">
              <strong data-i18n="hero.student_name"></strong>
              <span data-i18n="hero.student_status"></span>
            </div>
            <span class="ps-badge">✓</span>
          </div>
        </div>
      </div>
      <div class="hero-tag tag-2"><span class="icon">📍</span> <span data-i18n="hero.tag2"></span></div>
    </div>
  </section>

</body>

</html>
